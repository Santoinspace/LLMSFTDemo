# Compute-matched replay ablation: same optimizer-step budget as domain-only SFT.
model:
  model_name: "Qwen/Qwen3-1.7B"
  trust_remote_code: true

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_use_double_quant: true
  bnb_4bit_compute_dtype: "bfloat16"

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

training:
  batch_size: 1
  gradient_accumulation_steps: 16
  max_seq_length: 512
  num_epochs: 3
  max_steps: 3711
  learning_rate: 0.0002
  optimizer: "paged_adamw_8bit"
  warmup_ratio: 0.03
  lr_scheduler: "cosine"
  weight_decay: 0.01
  max_grad_norm: 1.0

save_and_logging:
  save_steps: 200
  logging_steps: 10
  eval_steps: 200
  save_total_limit: 3
  eval_strategy: "steps"
  save_strategy: "steps"
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false
